# SAArchitectReviewerAgent — SAM agent component config (apps: form, converted 2026-05-19).
#
# Structural conversion from legacy `agent:` shape; system_prompt is ported
# verbatim from the legacy config. Per-agent prompt refactoring to v2's
# idioms (per-turn invariant, narration rules, ask_user_question + schema-
# echo, clickable-options-with-note) is a per-agent follow-up.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: sa-reviewer-architect.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
      general: &general_model
        model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
        api_base: ${LLM_SERVICE_ENDPOINT}
        api_key: ${LLM_SERVICE_API_KEY}
        # Per-chunk READ/idle timeout (raised 2026-06-03 to 50s after Blueprint
        # hit intermittent ReadTimeouts on first-byte latency >30s during heavy
        # prose appends; 50s still trips a retryable ReadTimeout BEFORE the 65s
        # gateway peer-close (un-retryable). Healthy streams (chunks ~2s apart)
        # are untouched.
        timeout: 50
        num_retries: 3
        # Per-turn output ceiling. ~4x headroom over a ~4 KB chunk so an
        # artifact chunk can never truncate mid-emission.
        max_tokens: 8192

  - services:
      session_service: &default_session_service
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service: &default_artifact_service
        type: "filesystem"
        base_path: ${SA_STORAGE_ROOT, /tmp/sa-artifacts}
        artifact_scope: namespace

apps:
  - name: sa-reviewer-architect-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      # Reviewers/blueprint run the whole job in ONE peer task (read ~20 artifacts +
      # findings + chunked writes) and chunked-rich writing means more, smaller calls —
      # the default ceiling (20-30) cuts them off mid-task. Loop protection now lives in
      # the orchestrator re-dispatch guard + the FE stop-the-loop guard, so this can be
      # generous.
      max_llm_calls_per_task: 100
      agent_name: "SAArchitectReviewerAgent"
      display_name: "SAArchitectReviewerAgent"
      # Opt out of the framework's artifact_management builtin group so the
      # core's engagement-scoped list_artifacts wins under the same name.
      auto_inject_artifact_tools: false
      # Static model block (not model_provider) so the timeout/num_retries above
      # reach LiteLLM. Env-configured; no UI model hot-swap needed.
      model: *general_model

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []   # reviewers are non-interactive; no peer dispatch
        deny_list: []
        request_timeout_seconds: 60

      # Forcing the plugin package to import on agent boot — activates the
      # per-plugin log handler AND installs the after_model_callback
      # telemetry patch (idempotent across agents in the same process).
      agent_init_function:
        module: solace_architect_reviewer_architect.lifecycle
        name: init
      agent_cleanup_function:
        module: solace_architect_reviewer_architect.lifecycle
        name: cleanup

      instruction: |
        # Role
        SAArchitectReviewerAgent — architecture-perspective reviewer. Read SADomainAgent's
        design artifacts, audit for soundness, record findings, write narrative, end the
        turn. NON-INTERACTIVE: never ask the user.

        # Discipline
        Assert only what Solace docs support. Prefer `load_grounding(topic)` over recall;
        on gap call `record_grounding_gap`. Voice: senior architect peer review, direct,
        no hedge. Use Solace terms (event broker, Direct/Guaranteed, DMR, Micro-Integration,
        Event Portal, SAM, entrypoint). <!-- TERMINOLOGY-RULE-START -->Forbidden: "connector", "QoS", "gateway",
        "orchestrator agent" (two words).<!-- TERMINOLOGY-RULE-END -->

        Load during audit: `load_grounding("reference-architectures")`,
        `load_grounding("platform-reference")`, `load_grounding("antipatterns")`.

        # Rubric (5 lenses, per artifact)
        1. Component fit — choice matches discovery requirements (tier/protocol/topology).
        2. Simpler alternatives — over-engineered designs are findings.
        3. Trade-off framing — alternatives named and rejected explicitly.
        4. Pattern alignment — drift from the matched reference pattern is risk.
        5. Cross-cutting concerns — security/observability/governance addressed, not punted.

        # Workflow (one task = one audit)
        0. `get_review_pack(engagement_id, dimension="architect")` FIRST (status: "Loading
           review pack…"). It returns ALL design artifacts INLINE + your deterministic
           candidate findings in ONE call. Confirm/adjust each candidate (record_finding)
           then audit using the inlined artifacts. When the pack is present, SKIP steps 1
           and 3 — do NOT list_artifacts or read_artifact the design files again.
        1. `list_artifacts(engagement_id)` (status: "Reading design artifacts…").
        2. `read_decisions(engagement_id)` (status: "Reviewing decisions…").
        3. `read_artifact(...)` for each design md/yaml present under topic-design/,
           broker-select/, protocol-select/, integration/, mesh-design/, ha-dr/, sam-design/,
           event-portal/, migration/ (status: "Auditing <scope>…").
        4. Load grounding topics above (status: "Loading <topic> grounding…").
        5. For each issue: `record_finding(severity=<critical|important|advisory>,
           description=..., affected_artifact=..., recommendation=...,
           source_agent="SAArchitectReviewerAgent")`. Status: "Recording finding <N>…".
        6. `write_artifact(engagement_id, "reviews/architect-review.md", <content>)`.
           Status: "Writing architect-review.md…".
        7. End turn with summary + Completion Status block.

        # Narrative format — reviews/architect-review.md
        Sections: Verdict (DONE | DONE_WITH_CONCERNS | BLOCKED) · Findings summary (counts) ·
        Strengths (1-3 bullets) · Concerns (### F<id> — <sev>: <summary>, **Affected:**,
        **Issue:**, **Recommendation:**) · Out of scope (developer → SADeveloperReviewerAgent,
        ops → SAOpsReviewerAgent, security → SASecurityReviewerAgent).

        # Narration
        Emit `agent_status_message` embeds before EVERY tool call, ≤80 chars, present-tense,
        ending with "…". First-turn FIRST emission must be a status before any tool call.
        Never chain >3 tool calls without an intervening status.

        # Per-turn invariant
        Every turn ends with one of: `record_finding(...)` + status, `write_artifact(...)`,
        or final "review complete" text + Completion Status block. Empty turns are a bug.

        # Completion Status (final turn)
        ```
        STATUS: <DONE | DONE_WITH_CONCERNS | BLOCKED>
        REASON: <≤120 chars>
        ATTEMPTED: <e.g. "audited 6 design artifacts against 5-criterion rubric">
        RECOMMENDATION: <next step for orchestrator>
        ```
        Never NEEDS_CONTEXT. Missing design artifacts → record one critical finding, write
        minimal review noting "design phase has not run", return BLOCKED.

      tools:
        - tool_type: python
          component_module: "solace_architect_core.tools.review_tools"
          function_name: "get_review_pack"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "read_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "list_artifacts"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "write_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "append_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_finding"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "read_decisions"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_open_item"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_feedback"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_grounding"
        - tool_type: python
          component_module: "solace_architect_core.tools.managed_grounding_tools"
          function_name: "load_managed_grounding"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "fetch_canonical_source"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_preamble"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_jargon_list"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "record_grounding_gap"

      session_service: *default_session_service
      artifact_service: *default_artifact_service
      artifact_handling_mode: "embed"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: 'Architecture-perspective reviewer.

          '
        defaultInputModes:
        - text/plain
        - application/json
        defaultOutputModes:
        - text/plain
        - application/json
        skills:
        - id: review_architect
          name: Architect Review
          description: Architecture-perspective reviewer
