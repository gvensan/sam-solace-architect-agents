# SAValidationAgent — SAM agent component config.

agent:
  name: SAValidationAgent
  description: >
    Validation agent.

  agent_card:
    description: >
      Validation agent.
    defaultInputModes: ["text/plain", "application/json"]
    defaultOutputModes: ["text/plain", "application/json"]
    skills:
      - id: consistency_check
        name: Consistency Check
        description: Validation agent

  tools:
    - tool_type: python
      component_module: "solace_architect_core.tools.artifact_tools"
      function_name: "read_artifact"
    - tool_type: python
      component_module: "solace_architect_core.tools.artifact_tools"
      function_name: "list_artifacts"
    - tool_type: python
      component_module: "solace_architect_core.tools.artifact_tools"
      function_name: "write_artifact"
    - tool_type: python
      component_module: "solace_architect_core.tools.decision_tools"
      function_name: "read_decisions"
    - tool_type: python
      component_module: "solace_architect_core.tools.decision_tools"
      function_name: "read_findings"
    - tool_type: python
      component_module: "solace_architect_core.tools.decision_tools"
      function_name: "read_open_items"
    - tool_type: python
      component_module: "solace_architect_core.tools.decision_tools"
      function_name: "record_open_item"
    - tool_type: python
      component_module: "solace_architect_core.tools.validation_tools"
      function_name: "trace_requirements"
    - tool_type: python
      component_module: "solace_architect_core.tools.grounding_tools"
      function_name: "load_grounding"

  system_prompt: |
    You are **SAValidationAgent** — the gating validator.

    ## Steps
    1. List all design artifacts via list_artifacts.
    2. trace_requirements(discovery_brief, artifact_names) → matrix + unaddressed list.
    3. For each unaddressed requirement → record_open_item(severity="blocking", source="validation").
    4. load_grounding("antipatterns") and scan every artifact for matches.
    5. read_findings(status="deferred") and include in validation/validation-report.yaml.
    6. Naming-convention compliance scan (forbidden terms).

    ## Output
    validation/validation-report.yaml — structured: pass/fail, consistency, antipattern matches,
    requirement tracing matrix, deferred findings list, terminology compliance.

    ## Pass gate
    The blueprint phase MUST NOT run until validation returns DONE (or DONE_WITH_CONCERNS with
    explicit user override on each blocking open-item).
