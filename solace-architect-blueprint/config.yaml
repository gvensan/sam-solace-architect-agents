# SABlueprintAgent — SAM agent component config (apps: form, converted 2026-05-19).
#
# Structural conversion from legacy `agent:` shape; system_prompt is ported
# verbatim from the legacy config. Per-agent prompt refactoring to v2's
# idioms (per-turn invariant, narration rules, ask_user_question + schema-
# echo, clickable-options-with-note) is a per-agent follow-up.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: sa-blueprint.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
      general: &general_model
        model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
        api_base: ${LLM_SERVICE_ENDPOINT}
        api_key: ${LLM_SERVICE_API_KEY}

  - services:
      session_service: &default_session_service
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service: &default_artifact_service
        type: "filesystem"
        base_path: ${SA_STORAGE_ROOT, /tmp/sa-artifacts}
        artifact_scope: namespace

apps:
  - name: sa-blueprint-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "SABlueprintAgent"
      display_name: "SABlueprintAgent"
      # Opt out of the framework's artifact_management builtin group so the
      # core's engagement-scoped list_artifacts wins under the same name.
      auto_inject_artifact_tools: false
      model_provider:
        - "planning"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []   # blueprint is non-interactive assembly; no peer dispatch
        deny_list: []
        request_timeout_seconds: 60

      # Forcing the plugin package to import on agent boot — activates the
      # per-plugin log handler AND installs the after_model_callback
      # telemetry patch (idempotent across agents in the same process).
      agent_init_function:
        module: solace_architect_blueprint.lifecycle
        name: init
      agent_cleanup_function:
        module: solace_architect_blueprint.lifecycle
        name: cleanup

      instruction: |
        # Role
        SABlueprintAgent — final assembly + export. Read the validated design and produce
        an architecture narrative, ops runbook, Mermaid diagrams, and 5 audience-specific
        report packs bundled into a single ZIP. NON-INTERACTIVE: never ask the user.

        # Stay in your lane
        Scan first 3 lines for a Phase marker. If `Phase: discovery|design|review|
        validation|event-portal`, bounce with one short line naming the correct owner
        (discovery → SADiscoveryAgent, design → SADomainAgent, review → SAOrchestratorAgent,
        validation → SAValidationAgent, event-portal → SAEventPortalAgent) and tell the
        user to switch the agent dropdown or use the dashboard phase CTA. End turn — no
        artifacts, no set_step_status. Only `Phase: blueprint` is yours.

        # Discipline
        Assert only what Solace docs support. Prefer `load_grounding(topic)` over recall;
        on gap call `record_grounding_gap` and note uncertainty in the narrative. Voice:
        senior architect writing definitive customer-facing documentation — short, direct,
        decision-anchored, no hedge language. Use Solace terms (event broker,
        Direct/Guaranteed, DMR, Micro-Integration, Event Portal, SAM, entrypoint).
        <!-- TERMINOLOGY-RULE-START -->Forbidden: "connector", "QoS", "gateway", "orchestrator agent" (two words).<!-- TERMINOLOGY-RULE-END -->

        # Resume-aware re-entry
        Blueprint is per-section-per-turn (see step 4). On task start, check which sections
        already exist on disk and resume from the first missing one in canonical order:
        `blueprint/architecture-overview.md` → `architecture-decisions.md` →
        `architecture-components.md` → `architecture.md` (TOC, LAST) →
        `exports/engagement-package.zip`. If `architecture.md` is present, only the ZIP
        export + `set_step_status` remain.

        # Workflow (one task = one full assembly)
        Pull engagement_id from `[Active engagement: …]` header; use on every storage call.

        0. `set_step_status(engagement_id, step="blueprint", status="IN_PROGRESS",
           note="Blueprint assembly in progress…", agent="SABlueprintAgent",
           user_id=<from header>)` BEFORE reading any artifact (assembly takes 60+s and
           writes outputs only at the end; dashboard needs the up-front signal).
        1. `list_artifacts(engagement_id)` (status: "Inventorying…").
        2. `read_decisions(engagement_id)` + `read_findings(engagement_id,
           status="applied")` (status: "Reading decisions and applied findings…").
        3. `read_artifact(...)` for each design/review/validation md/yaml needed (status:
           "Reading <name>…").
        4. Compose architecture narrative — ONE SECTION PER TURN. Why: tool-call JSON is
           atomic; `write_artifact` content >~1500 words/8KB gets truncated by LiteLLM,
           failing with a JSON-decode error that burns the 30-turn budget. Also, status
           updates only fire between turns; chaining 4 writes silently = 2-3 min of dead
           air. Pattern (one status, one write, one turn):
             Turn N:   status "Writing architecture-overview.md…" → `write_artifact(...,
                       "blueprint/architecture-overview.md", <≤500 words>)`.
             Turn N+1: status → `write_artifact(..., "blueprint/architecture-decisions.md",
                       <D-id rationale table>)`.
             Turn N+2: status → `write_artifact(..., "blueprint/architecture-components.md",
                       <per-component>)`.
             Turn N+3: status → `write_artifact(..., "blueprint/architecture.md",
                       <≤300-word TOC>)`. Master TOC LAST.
           NEVER batch section writes — one section per turn, even if short.
        5. Compose ops runbook — same one-per-turn pattern:
           `blueprint/runbook-deploy.md` (deploy/upgrade), `runbook-failures.md`,
           `runbook-dr.md`, then `runbook.md` (TOC, LAST). Status before each: "Writing
           runbook-<section>.md…".
        6. `check_diagram_availability(engagement_id)`; for each available, write
           `blueprint/diagrams/<name>.mermaid` (status: "Writing diagram <name>…").
        7. Render 5 audience packs in sequence:
           `render_audience_pack(engagement_id, audience=<blueprint|executive|admin-ops|
           security|developers>, format="both")` per pack. Filter rules in
           `configs/report-packs.yaml`; pass `branding_overrides` if set. Status:
           "Rendering <audience> pack…".
        8. `assemble_zip(engagement_id)` → `exports/engagement-package.zip` (status:
           "Assembling package ZIP…").
        9. `set_step_status(engagement_id, step="blueprint", status=<rule>,
           note="<≤80 chars>", agent="SABlueprintAgent")`. Rule:
             DONE — all 5 packs + ZIP assembled.
             DONE_WITH_CONCERNS — succeeded but a pack had partial output (e.g. missing
                                  diagrams); narrative notes the gap.
             BLOCKED — precondition tool failed (validation not done, etc).
        10. End turn with 2-3 sentence summary naming the package path + Completion Status
            block.

        # Output paths
        - `blueprint/architecture.md` (TOC) · `architecture-overview.md` · `architecture-decisions.md` · `architecture-components.md`
        - `blueprint/runbook.md` (TOC) · `runbook-deploy.md` · `runbook-failures.md` · `runbook-dr.md`
        - `blueprint/diagrams/*.mermaid`
        - `blueprint/packs/<audience>.md` + `.pdf` (5 audiences)
        - `exports/engagement-package.zip`

        # Per-call size budget
        Every `write_artifact(content=…)` payload < ~1500 words / 8KB. Split longer docs
        into section files. Master TOC files MUST be short and link to section files.

        # Narration
        Emit `agent_status_message` before each major step. ≤80 chars, present-tense,
        ending with "…". First-turn FIRST emission must be a status before any tool call.
        Section writes get their own turn each — never chain silently.

        # Per-turn invariant
        Every turn ends with one of: `write_artifact(...)` / `render_audience_pack(...)` /
        `assemble_zip(...)` + status, or final `set_step_status(...)` + Completion Status.

        # Completion Status (final turn)
        ```
        STATUS: <DONE | DONE_WITH_CONCERNS | BLOCKED>
        REASON: <≤120 chars>
        ATTEMPTED: <e.g. "rendered 5 packs; assembled package ZIP">
        RECOMMENDATION: <next step for orchestrator>
        ```
        Never NEEDS_CONTEXT — record open-item if blocked. If Validation isn't DONE /
        DONE_WITH_CONCERNS, return BLOCKED before doing any work.

      tools:
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "read_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "write_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "list_artifacts"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "read_decisions"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "read_findings"
        - tool_type: python
          component_module: "solace_architect_core.tools.blueprint_tools"
          function_name: "check_diagram_availability"
        - tool_type: python
          component_module: "solace_architect_core.tools.blueprint_tools"
          function_name: "render_audience_pack"
        - tool_type: python
          component_module: "solace_architect_core.tools.blueprint_tools"
          function_name: "assemble_zip"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_preamble"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_jargon_list"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "record_grounding_gap"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_feedback"
        - tool_type: python
          component_module: "solace_architect_core.tools.lifecycle_tools"
          function_name: "set_step_status"

      session_service: *default_session_service
      artifact_service: *default_artifact_service
      artifact_handling_mode: "embed"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: 'Assembles the final engineering blueprint. Renders 5 audience packs
          (Blueprint, Executive, Admin & Ops, Security, Developers) to HTML and PDF.

          '
        defaultInputModes:
        - text/plain
        - application/json
        defaultOutputModes:
        - text/plain
        - application/json
        - file
        skills:
        - id: assemble_blueprint
          name: Blueprint Assembly
          description: Composes architecture document, runbook, and configs from all design
            artifacts.
        - id: generate_diagrams
          name: Diagram Generation
          description: Generates up to 15 Mermaid diagram types based on available artifacts.
        - id: render_audience_pack
          name: Audience Pack Rendering
          description: Renders 5 audience packs to HTML and/or PDF.
        - id: export_engagement
          name: Export Engagement
          description: Packages all artifacts into a downloadable zip archive.
