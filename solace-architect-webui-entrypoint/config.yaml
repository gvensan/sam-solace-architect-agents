# solace-architect-webui-entrypoint — SAM entrypoint plugin config.
#
# v2spec §6. Serves both the WebUI dashboard and the REST API surface.
#
# Run with:  sam run config.yaml
# Or inside a SAM project that has installed this plugin via `sam plugin add`.

log:
  stdout_log_level: ${LOG_LEVEL, INFO}
  log_file_level: ${LOG_LEVEL, INFO}
  log_file: logs/sam-solace-architect-webui.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8008}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - services:
      # Single storage root for everything Solace Architect writes:
      #   - SAM's filesystem artifact_service (FilePart bytes, agent-produced files)
      #   - solace-architect-core's project/intake/decisions YAML
      # When SA_STORAGE_ROOT is unset, the entrypoint sets it (process-wide) to
      # this base_path at startup so the core library and the artifact service
      # never diverge.
      artifact_service: &default_artifact_service
        type: "filesystem"
        base_path: ${SA_STORAGE_ROOT, /tmp/sa-artifacts}
        artifact_scope: namespace

apps:
  - name: solace_architect_webui_app
    app_module: solace_architect_webui_entrypoint.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}                       # required — fails loud if missing
      artifact_service: *default_artifact_service
      gateway_id: ${WEBUI_ENTRYPOINT_ID, sa-webui-ep-01}
      default_agent_name: SAOrchestratorAgent

      # WebUI-specific adapter config (consumed by SolaceArchitectWebuiComponent)
      # Port defaults to 9080 — SAM's stock webui gateway already binds 8080, so
      # using 8080 collides whenever both run in the same project.
      adapter_config:
        port: ${WEBUI_PORT, 9080}
        host: ${WEBUI_HOST, 0.0.0.0}
        show_status_updates: true
        # Path to branding overrides (relative to working dir).
        # Defaults to solace_architect_core's bundled branding.yaml.
        branding_overrides: ${WEBUI_BRANDING_OVERRIDES, ""}

      enable_embed_resolution: true
      gateway_max_artifact_resolve_size_bytes: 10000000
      gateway_recursive_embed_depth: 3

      # Phase 1: anonymous auth; Phase 2: OIDC (see v2spec Decision 21).
      authorization_service:
        type: ${AUTH_TYPE, none}
        oidc_issuer: ${OIDC_ISSUER, ""}
        oidc_client_id: ${OIDC_CLIENT_ID, ""}

      system_purpose: >
        Solace Architect — an architect's toolkit that guides users from a
        business problem to a deployable Solace event-driven architecture
        blueprint. The system orchestrates discovery, design, review,
        validation, blueprint assembly, and (opt-in) live Event Portal
        provisioning across ten purpose-built SAM agents.

      response_format: >
        Responses are presented in a senior-architect voice — short sentences,
        Solace-native terminology (event broker, Direct/Guaranteed messaging,
        Micro-Integration, DMR, SAM, entrypoint), decisions framed in
        user-outcome terms, jargon glossed on first use.
