<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Sign up — Solace Architect</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { display: grid; place-items: center; min-height: 100vh; }
    .auth-card { width: 380px; padding: 32px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .auth-brand .logo-mark { width: 36px; height: 36px; border-radius: 8px;
      background: var(--accent); color: var(--primary);
      font-family: 'Space Mono', monospace; font-weight: 700;
      display: grid; place-items: center; font-size: 14px; }
    .auth-brand .title { font-weight: 700; color: var(--primary); }
    h1 { font-size: 18px; color: var(--primary); margin-bottom: 4px; }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 6px; background: var(--bg); color: var(--text);
      font-family: 'Figtree', sans-serif; font-size: 14px; }
    input:focus { outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,200,149,0.15); }
    button[type=submit] { width: 100%; margin-top: 20px; padding: 10px;
      background: var(--primary); color: white; border: none; border-radius: 6px;
      font-family: 'Figtree', sans-serif; font-weight: 600; font-size: 14px;
      cursor: pointer; }
    button[type=submit]:hover { background: var(--accent); color: var(--primary); }
    .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca;
      padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-top: 12px; display: none; }
    .error.shown { display: block; }
    .admin-notice { background: #fffbeb; color: #92400e; border: 1px solid #fde68a;
      padding: 10px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; display: none; }
    .admin-notice.shown { display: block; }
    .footer-link { text-align: center; margin-top: 16px; font-size: 13px; color: var(--muted); }
    .footer-link a { color: var(--primary); }
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-brand">
      <span class="logo-mark">SA</span>
      <span class="title">Solace Architect</span>
    </div>

    <div id="admin-notice" class="admin-notice">
      You're the first user — this account will be created with admin privileges.
    </div>

    <h1>Create account</h1>
    <div class="subtitle">All fields except email are required.</div>

    <form id="signup-form" autocomplete="on">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required autofocus>
      <div class="hint">No spaces or '@' — used to sign in.</div>

      <label for="display_name">Display name</label>
      <input id="display_name" name="display_name" autocomplete="name">

      <label for="email">Email (optional)</label>
      <input id="email" name="email" type="email" autocomplete="email">

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="new-password" required>
      <div class="hint">At least 8 characters.</div>

      <div id="error" class="error"></div>

      <button type="submit" id="submit-btn">Create account</button>
    </form>

    <div class="footer-link">
      Have an account? <a href="/login">Sign in</a>
    </div>
  </div>

  <script>
    (async function () {
      try {
        const me = await fetch("/api/auth/me").then(r => r.json());
        if (me.authenticated) {
          window.location.href = "/";
          return;
        }
        if (me.first_run) document.getElementById("admin-notice").classList.add("shown");
        // If signup is disabled and we already have at least one user, the GET /signup will 403 before we get here.
      } catch (e) { /* default state */ }
    })();

    const errEl = document.getElementById("error");
    const btn = document.getElementById("submit-btn");

    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.classList.remove("shown");
      btn.disabled = true; btn.textContent = "Creating…";
      try {
        const r = await fetch("/api/auth/signup", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            display_name: document.getElementById("display_name").value.trim(),
            email: document.getElementById("email").value.trim() || null,
            password: document.getElementById("password").value,
          }),
        });
        const d = await r.json();
        if (!r.ok) {
          errEl.textContent = d.error || "Signup failed";
          errEl.classList.add("shown");
          btn.disabled = false; btn.textContent = "Create account";
          return;
        }
        window.location.href = d.redirect || "/";
      } catch (err) {
        errEl.textContent = "Network error — please retry";
        errEl.classList.add("shown");
        btn.disabled = false; btn.textContent = "Create account";
      }
    });
  </script>
</body>
</html>
