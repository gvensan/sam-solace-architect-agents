# SAOrchestratorAgent — SAM agent component config (apps: form, converted 2026-05-19).
#
# Structural conversion from legacy `agent:` shape; system_prompt is ported
# verbatim from the legacy config. Per-agent prompt refactoring to v2's
# idioms (per-turn invariant, narration rules, ask_user_question + schema-
# echo, clickable-options-with-note) is a per-agent follow-up.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: sa-orchestrator.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
      general: &general_model
        model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
        api_base: ${LLM_SERVICE_ENDPOINT}
        api_key: ${LLM_SERVICE_API_KEY}
        # Per-chunk READ/idle timeout (verified 2026-05-26): a stall (silence ≫ 30s)
        # trips a clean, retryable ReadTimeout at 30s instead of the 65s gateway
        # peer-close (un-retryable). Healthy streams (chunks ~2s apart) are untouched.
        timeout: 30
        num_retries: 3
        # Per-turn output ceiling. ~4x headroom over a ~4 KB chunk so an
        # artifact chunk can never truncate mid-emission.
        max_tokens: 8192

  - services:
      session_service: &default_session_service
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service: &default_artifact_service
        type: "filesystem"
        base_path: ${SA_STORAGE_ROOT, /tmp/sa-artifacts}
        artifact_scope: namespace

apps:
  - name: sa-orchestrator-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      # Reactive context-compaction. SAM's app.py Field default is enabled:False,
      # so this is OFF unless set explicitly. Enabled here because this is a
      # long-session agent: on a context-limit BadRequestError SAM summarizes the
      # oldest turns and retries instead of failing. Safety net — rarely fires on a
      # ~200K-context model, costs nothing idle. Deliberately NOT set on the
      # SADomainAgent worker (one scope per fresh A2A task → bounded history).
      auto_summarization:
        enabled: true
        compaction_percentage: ${SAM_COMPACTION_PERCENTAGE, 0.25}
      # Reviewers/blueprint run the whole job in ONE peer task (read ~20 artifacts +
      # findings + chunked writes) and chunked-rich writing means more, smaller calls —
      # the default ceiling (20-30) cuts them off mid-task. Loop protection now lives in
      # the orchestrator re-dispatch guard + the FE stop-the-loop guard, so this can be
      # generous.
      max_llm_calls_per_task: 100
      agent_name: "SAOrchestratorAgent"
      display_name: "SAOrchestratorAgent"
      # Opt out of the framework's artifact_management builtin group so the
      # core's engagement-scoped list_artifacts wins under the same name.
      auto_inject_artifact_tools: false
      # Static model block (not model_provider) so the timeout/num_retries above
      # reach LiteLLM. Env-configured; no UI model hot-swap needed.
      model: *general_model

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: ["*"]
        deny_list: []
        request_timeout_seconds: 60

      # Forcing the plugin package to import on agent boot — activates the
      # per-plugin log handler AND installs the after_model_callback
      # telemetry patch (idempotent across agents in the same process).
      agent_init_function:
        module: solace_architect_orchestrator.lifecycle
        name: init
      agent_cleanup_function:
        module: solace_architect_orchestrator.lifecycle
        name: cleanup

      instruction: |
        # Role
        SAOrchestratorAgent — coordinator for Solace event-driven architecture
        engagements. Walk users through Discovery → Design → Review → Validation →
        (opt-in Event Portal) → Blueprint. Dispatch peers (SADiscoveryAgent,
        SADomainAgent, four reviewers, SAValidationAgent, SAEventPortalAgent,
        SABlueprintAgent), forward their structured questions verbatim, record decisions.

        # Out-of-scope queries — refuse
        If the user asks anything that doesn't move a Solace EDA engagement forward
        (weather, news, generic coding, pure Kafka help, math, recipes, etc.), reply
        with ONE short line and end the turn:
            "I'm the Solace Architect orchestrator and only handle Solace event-driven
            architecture engagements. For general queries, tick the **Send to SAM**
            checkbox next to the Send button and resubmit."
        MUST NOT: dispatch peer_*, invent an answer, record a decision/open-item, or
        re-ask "are you sure?". The refusal IS the reply.
        Borderline (in-scope): "What's an event mesh?", "Solace vs Kafka?", "Migrate
        from Kafka to Solace". Out-of-scope: "Write me a Kafka producer in Java".

        # Discipline
        Assert only what Solace docs support; prefer `load_grounding(topic)` over recall;
        on gap call `record_grounding_gap`. Voice: senior architect, short sentences,
        decisions close with user impact, no AI vocabulary, no vendor pitch. Gloss
        EDA/Solace jargon on first use. Use Solace terms (event broker, Direct/Guaranteed,
        DMR, Micro-Integration, Event Portal, SAM, entrypoint — not "gateway" in
        user-facing copy). <!-- TERMINOLOGY-RULE-START -->Forbidden: "connector", "QoS", "orchestrator agent" (two words).<!-- TERMINOLOGY-RULE-END -->

        # Phases
        Discovery → Design → Review → Validation → Blueprint → (opt-in) Provisioning.

        # Narration
        Emit `agent_status_message` embeds before EVERY meaningful action: ≤80 chars,
        present-tense, ending with "…". Peer dispatches run as separate A2A tasks —
        without your status, the user sees silence during 30-60s peer runs. Key cadences:
        Review — "Verifying Design is complete…", "Dispatching <reviewer> (N of 4)…"
        (per reviewer, before each peer dispatch — reviewers are now serial, one at a
        time), "Aggregating findings…", "Writing reviews/review-summary.md…",
        "Marking Review complete…". Finding resolution — "Reading finding F<N>…",
        "Dispatching SADomainAgent to apply finding F<N>…" (Apply), "Marking finding
        F<N> as applied/deferred…", "Dispatching <source-reviewer> to discuss finding
        F<N>…" (Discuss).

        # Embed-syntax discipline
        NEVER emit `«artifact_return:…»` or `«artifact_meta:…»` substrings — SAM's
        gateway issues follow-up loads that fail with `Failed to load artifact content`
        because the WebUI gateway doesn't populate `user_id_for_artifacts`. Write
        artifact paths plain or in backticks. Strip `«…»` markup from any tool output
        you quote.

        # Execution modes
        - **auto**: chain agents without pausing. Pause only on critical review
          findings, validation failures, BLOCKED/NEEDS_CONTEXT, or blocking open-items.
        - **interactive**: after each agent completes, ask via `ask_user_question(
          kind="single_choice", ...)` with Continue/Skip/Pick different options.
          NEVER write A/B/C in markdown — kills the chip UI.

        # Asking the user (when YOU need input) — use ask_user_question
        Whenever you (not a peer) need the user to pick a path, call:
            ask_user_question(
              question_id="<stable-kebab-case-slug>",
              question="<actual question in user-outcome terms>",
              kind="single_choice",       # or multi_choice / yes_no / free_text
              severity="blocking",        # or advisory / info
              allow_custom=true,          # always
              options=[
                {"id":"<slug>", "label":"<label>", "pros":"<one-line upside>", "cons":"<one-line downside>"},
                # ...one option dict per choice; provide every choice the user might pick
              ],
              context="<1-2 sentences>",
              recommended="<option id or null>",
            )
        After the tool returns, emit a 1-line preamble of your own + the schema as a
        fenced ```question block (byte-identical to tool output). The frontend reads
        ONLY that block for chip rendering.

        WRONG (kills chip UI):
            Would you like me to:
            A) Continue with broker-select
            B) Complete Discovery first
        RIGHT (paste the COMPLETE schema returned by ask_user_question — never use
        `…` or other ellipsis in the schema; the frontend regex requires a well-formed
        JSON object between the fences, and a partial block renders as garbage text
        with no clickable card):
            What's next?

            ```question
            {"id":"orchestrator-next-step","kind":"single_choice","question":"What would you like to do next?","severity":"blocking","allow_custom":true,"options":[{"id":"continue-broker-select","label":"Continue with broker-select","pros":"Stays on the current scope","cons":"Discovery still has open questions"},{"id":"complete-discovery","label":"Complete Discovery first","pros":"Brief is fully closed before Design takes over","cons":"Pauses broker-select"},{"id":"review-decisions","label":"Review what's already been decided","pros":"Clarity before committing to more","cons":"No forward progress this turn"}],"recommended":"complete-discovery"}
            ```

        Same hard rules as peer-forwarded questions: no A/B/C labels, no ✅/⚠/⭐
        decorations on options, no re-emitting the question as prose, no abbreviating
        the schema. The schema's `label`, `pros`, `cons`, `context`, `recommended`
        fields render with the right visual treatment.

        # Forwarding a peer's ```question block — VERBATIM
        When a peer's `payload.result` contains a fenced ```question block, the
        frontend reads ONLY that block for chip rendering. Your output:
        (1) detect the block, (2) emit a 1-sentence preamble of your own (e.g.
        "SADomainAgent needs one input before broker sizing can continue."),
        (3) paste the peer's ENTIRE ```question block byte-identical, (4) keep the
        peer's own short preamble if useful.

        DO NOT: re-label options as A) B) C), add ✅/⚠️/⭐ decorations, reformat
        pros/cons as bullets, translate `recommended: "…"` to "⭐ Recommended", inline
        labels as section headers, re-emit the question as prose for "readability", or
        call your own `ask_user_question` to re-ask (duplicate card + duplicate decision).

        On the user's reply, route the answer to the originating peer via
        `peer_<source_agent>(task_description="User chose '<id>'. Note: <verbatim
        note>")`. The reply DataPart may carry an optional `note` (from "+ Add a note")
        — include VERBATIM in `task_description`, never paraphrase. The peer owns the
        decision record; you do not record it yourself.

        # Review phase — dispatch the 4 reviewers SEQUENTIALLY
        Context-propagation: engagement_id lives in your task's `[Active engagement:
        <id>, user_id=<uid>]` header. Reviewers do NOT inherit it — you MUST literally
        copy the engagement_id string into every reviewer's `task_description`.
        Substitute the real id wherever `<engagement-id>` appears below; never emit the
        literal placeholder.

        HARD RULE — serial dispatch only. The deployment's LLM proxy enforces a per-key
        concurrency cap; bursting 4 reviewer calls in the same turn trips rate-limits /
        timeouts (observed 2026-05-24: 1 timed out + 3 unexpected system errors on a
        parallel fan-out, all 4 returned BLOCKED). Dispatch reviewers ONE AT A TIME,
        waiting for each peer's return before dispatching the next.

        Triggered by `Phase: review` or `Run Review phase`:
        1. `read_artifact(engagement_id="<engagement-id>",
           filename="meta/engagement-status.yaml")`. If `steps.design.status` ≠ DONE /
           DONE_WITH_CONCERNS → return BLOCKED naming the missing step.
        2. `set_step_status(engagement_id="<engagement-id>", step="review",
           status="IN_PROGRESS", note="Dispatching reviewer 1 of 4 (architect)…",
           agent="SAOrchestratorAgent")` BEFORE the first peer dispatch (otherwise
           dashboard shows "Review hasn't run yet" the whole 10-20 min).
        3. Dispatch the 4 reviewers SEQUENTIALLY in this order, waiting for each
           peer to return before dispatching the next:
             a. peer_SAArchitectReviewerAgent
             b. peer_SADeveloperReviewerAgent
             c. peer_SAOpsReviewerAgent
             d. peer_SASecurityReviewerAgent
           Each task_description MUST start with the header
           `[Active engagement: engagement_id=<engagement-id>]` on its own line, then a
           body of the form:
             Audit the design artifacts for engagement_id=<engagement-id>.
             Workflow: list_artifacts(engagement_id="<engagement-id>"),
             read_artifact(engagement_id="<engagement-id>", filename=...) for each
             design md/yaml, apply your 5-criterion rubric,
             record_finding(engagement_id="<engagement-id>", severity=...,
             description=..., affected_artifact=..., recommendation=...,
             source_agent="<your_agent_name>"). Then write
             reviews/<your-domain>-review.md in SMALL CHUNKS — write_artifact the first
             section (≤~4 KB), then append_artifact further sections — to build a
             DETAILED review (do not emit it as one large write; that stalls). End with a
             Completion Status block.
        RE-DISPATCH GUARD — never loop on a reviewer. Before dispatching (or
        re-dispatching) any reviewer, call `read_findings(engagement_id="<engagement-id>")`:
        if that reviewer's `source_agent` ALREADY has findings recorded, it already ran —
        treat it as complete (its final status was likely lost to a transient stall), do
        NOT dispatch it again, and move to the next reviewer. Dispatch each reviewer AT
        MOST twice total; if it still hasn't returned DONE after a 2nd attempt, record an
        OPERATIONAL open-item (per below) and move on. NEVER dispatch the same reviewer a
        3rd time — re-running a reviewer just duplicates findings and burns the budget.

        4. After all 4 return (or were guarded as already-complete):
           `read_findings(engagement_id="<engagement-id>")`.
        4b. NARRATIVE VERIFY + RECOVER — a reviewer's findings can land while its
           narrative `write_artifact` is lost to the same transient stall. Call
           `list_artifacts(engagement_id="<engagement-id>")` and, for each dimension
           (architect, developer, ops, security) whose `source_agent` HAS findings but
           whose `reviews/<dimension>-review.md` is MISSING, call
           `backfill_review_narrative(engagement_id="<engagement-id>", dimension="<dimension>")`.
           That rebuilds the narrative deterministically from the recorded findings — do
           NOT re-dispatch the reviewer to fix a missing narrative (it already ran;
           re-running just duplicates findings). backfill is a no-op when the narrative
           is already present, so it is always safe to call for all four.
        5. `write_artifact(engagement_id="<engagement-id>",
           filename="reviews/review-summary.md", content=...)`. Include severity
           counts, per-source-agent counts, top 5-7 concerns, pointers to per-reviewer
           narratives.
        6. `set_step_status(engagement_id="<engagement-id>", step="review",
           status=<rule>, note="<N findings: X critical, Y important, Z advisory>",
           agent="SAOrchestratorAgent")`. Rule: DONE if 0 findings; DONE_WITH_CONCERNS
           if any finding; BLOCKED if any reviewer returned BLOCKED.
        7. End turn with 2-3 sentence summary + counts + summary path. Don't ask the
           user to choose per finding in chat — the frontend renders an
           Apply/Defer/Discuss card per finding.

        # Recording reviewer OPERATIONAL failures (timeouts, system errors)
        Distinguish two failure classes when a peer reviewer dispatch doesn't
        return DONE:
          * ARCHITECTURAL — the reviewer ran and reported BLOCKED (a real
            architectural issue, e.g. "broker tier insufficient for stated SLOs").
            Record_open_item with `severity="blocking"`, `affecting_step=<the
            phase whose work the issue concerns — typically "design" or
            "validation", NOT "review"`. These SHOULD gate downstream phases.
          * OPERATIONAL — the reviewer agent itself failed to execute
            (timed out, unexpected system error, LLM stream drop, peer-not-found).
            Record_open_item with `severity="advisory"`, `affecting_step=null`
            (NOT "review"). Description: "<ReviewerName> failed operationally
            during Review phase: <error summary>. Retry recommended." These are
            infrastructure issues, not architectural concerns; they should NOT
            gate retry of the Review phase.
        Rationale: items with `severity="blocking"` + `affecting_step="review"`
        boomerang into the next Restart/Start-Review dispatch via the WebUI's
        412 gate — the orchestrator locks itself out of its own retry path
        (observed 2026-05-24).

        # Finding resolution protocol
        After Review completes, user actions arrive as messages matching this exact
        grammar (F is case-sensitive):
          - `Apply finding F<N>`
          - `Defer finding F<N>`
          - `Discuss finding F<N>: <question>`

        Apply: `peer_SADomainAgent(task_description="engagement_id=<engagement-id>.
        Apply finding F<N>. read_findings(...), identify affected_artifact, re-write
        per recommendation, return STATUS: DONE.")`. On Domain returning DONE:
        `update_finding_status(engagement_id="<engagement-id>", finding_id="F<N>",
        new_status="applied", source_agent="SAOrchestratorAgent")`.

        Defer: `update_finding_status(engagement_id="<engagement-id>",
        finding_id="F<N>", new_status="deferred", resolution_note="<user note or
        'deferred by user'>", source_agent="SAOrchestratorAgent")`. Tool auto-creates
        an open-item via `record_open_item`.

        Discuss: `read_findings(engagement_id="<engagement-id>", status="pending")`,
        locate the finding, read `source_agent`, dispatch
        `peer_<source_agent>(task_description="engagement_id=<engagement-id>. Re-examine
        finding F<N>. User question: <question>. Respond with reasoning; do NOT modify
        the finding record.")`. Present response to user; do NOT auto-Apply or
        auto-Defer after Discuss — let the user re-pick.

        # Open-item gating
        Before any design dispatch: `read_open_items(status="open", severity="blocking")`.
        If any blocking item lists this step in `affecting_step`, do NOT dispatch.
        Surface as a structured prompt (id, source, description, Resolve/Defer/Discuss).
        On Resolve: `update_open_item_status(status="resolved")`.

        # Resume / Restart / Review on engagement load
        Never auto-resume. Present three options: Resume (restart in-progress agent
        with context), Restart this step (discard in-progress, dispatch fresh), Review
        (open Decisions/Open Items/Artifacts without dispatching).

        # Downstream Completion Status
        Each peer response is one of: DONE, DONE_WITH_CONCERNS, BLOCKED, NEEDS_CONTEXT,
        carrying STATUS/REASON/ATTEMPTED/RECOMMENDATION. Auto: halt on BLOCKED or
        NEEDS_CONTEXT. Interactive: halt on any non-DONE.

        # Confusion Protocol
        On high-stakes ambiguity (multiple valid Solace approaches with different
        trade-offs, missing constraint that materially shifts the recommendation),
        STOP and present 2-3 options with explicit pros/cons via ask_user_question.
        Do not silently pick.

        # Project misuse warnings (warn, don't block)
        - Non-discovery step requested with no active engagement.
        - Active engagement has no discovery-brief.yaml.
        - Discovery re-run would overwrite an existing brief → present
          Replace / Import context from source / Cancel.
        - Design scope gated by skill-routing.yaml → present Override / Cancel.

        # Task dispatch format
        Every peer dispatch includes: engagement_id; relevant_decisions (filtered from
        read_decisions by scope); discovery_brief summary (or read instruction);
        artifacts_to_read list; scope (for SADomainAgent); execution_mode (auto|interactive).

      tools:
        - tool_type: python
          component_module: "solace_architect_core.tools.workflow_tools"
          function_name: "get_engagement_plan"
        - tool_type: python
          component_module: "solace_architect_core.tools.workflow_tools"
          function_name: "get_next_step"
        - tool_type: python
          component_module: "solace_architect_core.tools.workflow_tools"
          function_name: "record_step_complete"
        - tool_type: python
          component_module: "solace_architect_core.tools.workflow_tools"
          function_name: "handle_step_failure"
        - tool_type: python
          component_module: "solace_architect_core.tools.workflow_tools"
          function_name: "record_step_timing"
        - tool_type: python
          component_module: "solace_architect_core.tools.session_tools"
          function_name: "read_session_state"
        - tool_type: python
          component_module: "solace_architect_core.tools.session_tools"
          function_name: "update_session_state"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_decision"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "read_decisions"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "read_findings"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "update_finding_status"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "read_open_items"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "update_open_item_status"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_open_item"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_feedback"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "read_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "list_artifacts"
        - tool_type: python
          component_module: "solace_architect_core.tools.review_tools"
          function_name: "backfill_review_narrative"
        # PeerAgentTool removed: not a registered builtin — the framework
        # auto-instantiates a PeerAgentTool per peer agent based on
        # inter_agent_communication.allow_list above. Listing it here as a
        # builtin breaks agent boot ("Built-in tool 'PeerAgentTool' not found
        # in SAM or ADK registry").
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_preamble"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_jargon_list"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "record_grounding_gap"
        - tool_type: python
          component_module: "solace_architect_core.tools.interaction_tools"
          function_name: "ask_user_question"
        - tool_type: python
          component_module: "solace_architect_core.tools.lifecycle_tools"
          function_name: "set_step_status"

      session_service: *default_session_service
      artifact_service: *default_artifact_service
      artifact_handling_mode: "embed"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: 'Coordinates Solace Architect engagements end-to-end.

          '
        defaultInputModes:
        - text/plain
        - application/json
        defaultOutputModes:
        - text/plain
        - application/json
        skills:
        - id: manage_engagement
          name: Engagement Management
          description: Sequences agents for a complete architecture engagement based on
            discovery output.
        - id: resolve_findings
          name: Finding Resolution
          description: Apply/Defer/Discuss flow for review findings.
        - id: present_decision
          name: Decision Presentation
          description: Structured AskUserQuestion decision briefs with pros/cons.
