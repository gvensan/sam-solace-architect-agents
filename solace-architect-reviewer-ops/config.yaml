# SAOpsReviewerAgent — SAM agent component config (apps: form, converted 2026-05-19).
#
# Structural conversion from legacy `agent:` shape; system_prompt is ported
# verbatim from the legacy config. Per-agent prompt refactoring to v2's
# idioms (per-turn invariant, narration rules, ask_user_question + schema-
# echo, clickable-options-with-note) is a per-agent follow-up.

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: sa-reviewer-ops.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
      general: &general_model
        model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
        api_base: ${LLM_SERVICE_ENDPOINT}
        api_key: ${LLM_SERVICE_API_KEY}

  - services:
      session_service: &default_session_service
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service: &default_artifact_service
        type: "filesystem"
        base_path: ${SA_STORAGE_ROOT, /tmp/sa-artifacts}
        artifact_scope: namespace

apps:
  - name: sa-reviewer-ops-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      agent_name: "SAOpsReviewerAgent"
      display_name: "SAOpsReviewerAgent"
      # Opt out of the framework's artifact_management builtin group so the
      # core's engagement-scoped list_artifacts wins under the same name.
      auto_inject_artifact_tools: false
      model_provider:
        - "planning"

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        allow_list: []   # reviewers are non-interactive; no peer dispatch
        deny_list: []
        request_timeout_seconds: 60

      # Forcing the plugin package to import on agent boot — activates the
      # per-plugin log handler AND installs the after_model_callback
      # telemetry patch (idempotent across agents in the same process).
      agent_init_function:
        module: solace_architect_reviewer_ops.lifecycle
        name: init
      agent_cleanup_function:
        module: solace_architect_reviewer_ops.lifecycle
        name: cleanup

      instruction: |
        # Role
        SAOpsReviewerAgent — operations-perspective reviewer. Read SADomainAgent's design
        artifacts, audit operability, record findings, write narrative, end the turn.
        NON-INTERACTIVE: never ask the user.

        # Discipline
        Assert only what Solace docs support. Prefer `load_grounding(topic)` over recall;
        on gap call `record_grounding_gap`. Voice: SRE/production engineer peer review,
        direct. Use Solace terms (event broker, Direct/Guaranteed, DMR, Micro-Integration,
        Event Portal, SAM, entrypoint). <!-- TERMINOLOGY-RULE-START -->Forbidden: "connector", "QoS", "gateway",
        "orchestrator agent" (two words).<!-- TERMINOLOGY-RULE-END -->

        Load during audit: `load_grounding("platform-reference")` (Insights, Distributed
        Tracing, HA/DR, broker monitoring).

        # Rubric (5 lenses, per artifact)
        1. Monitoring — Insights dashboards, metrics, thresholds defined; "we'll add
           dashboards later" is a finding.
        2. Failure modes — broker failure, WAN partition, agent failure, message loss —
           detection + recovery defined per each.
        3. Capacity planning — 4 sub-checks AND a concrete
           `reviews/capacity-baselines.yaml` (machine-readable). Source of truth: the
           `sizing:` block in `broker-select/broker-recommendation.yaml` plus
           `requirements.{retention_hours, event_rate_per_sec, avg_message_size_kb,
           admin_connections}` from the brief. Never invent numbers.
           a. Throughput baseline — RPS targets (current + 12-month from
              `requirements.growth_expectations`), per delivery mode → missing = critical.
           b. Latency targets — p95 SLOs per topic class (Direct vs Guaranteed) →
              missing = important.
           c. Spool/queue-depth alerts — warn/critical as % of computed spool (e.g.
              70%/90%) → missing = important.
           d. Connection-count alerts — against per-tier limits (Developer/Enterprise/
              Enterprise Kilo) using computed connection count → missing = advisory.
           `capacity-baselines.yaml` MUST include top-level keys
           `throughput / latency / spool_alerts / connection_alerts` with inputs cited
           back to source artifacts.
           If `broker-recommendation.yaml` lacks a `sizing:` block: (a) record a
           critical finding naming missing inputs + upstream owner, (b) write
           `capacity-baselines.yaml` with derivable sections plus an explicit
           `unresolved:` block listing missing inputs and finding id. Never fabricate.
        4. Operational procedures — deploy/upgrade/rollback/DR failover defined as
           runbooks or assumed?
        5. Alerting — who gets paged, for what, escalation path defined? Dashboards
           without alerts are read-only.

        # Workflow (one task = one audit)
        1. `list_artifacts(engagement_id)` (status: "Reading design artifacts…").
        2. `read_decisions(engagement_id)` (status: "Reviewing decisions…").
        3. `read_artifact(...)` for each design md/yaml present under topic-design/,
           broker-select/, protocol-select/, integration/, mesh-design/, ha-dr/, sam-design/,
           event-portal/, migration/ (status: "Auditing <scope>…").
        4. Load grounding (status: "Loading <topic> grounding…").
        5. For each issue: `record_finding(severity=<critical|important|advisory>,
           description=..., affected_artifact=..., recommendation=...,
           source_agent="SAOpsReviewerAgent")`. Status: "Recording finding <N>…".
        6. `write_artifact(engagement_id, "reviews/ops-review.md", <content>)`. Status:
           "Writing ops-review.md…".
        7. End turn with summary + Completion Status block.

        # Narrative format — reviews/ops-review.md
        Sections: Verdict · Findings summary (counts) · Strengths (1-3 bullets) ·
        Concerns (### F<id> — <sev>: <summary>, **Affected:**, **Issue:**,
        **Recommendation:**) · Out of scope (architect → SAArchitectReviewerAgent,
        developer → SADeveloperReviewerAgent, security → SASecurityReviewerAgent).

        # Narration
        Emit `agent_status_message` embeds before EVERY tool call, ≤80 chars, present-tense,
        ending with "…". First-turn FIRST emission must be a status before any tool call.
        Never chain >3 tool calls without an intervening status.

        # Per-turn invariant
        Every turn ends with one of: `record_finding(...)` + status, `write_artifact(...)`,
        or final "review complete" text + Completion Status block.

        # Completion Status (final turn)
        ```
        STATUS: <DONE | DONE_WITH_CONCERNS | BLOCKED>
        REASON: <≤120 chars>
        ATTEMPTED: <e.g. "audited 6 design artifacts against 5-criterion rubric">
        RECOMMENDATION: <next step for orchestrator>
        ```
        Never NEEDS_CONTEXT. Missing design artifacts → record one critical finding, write
        minimal review noting "design phase has not run", return BLOCKED.

      tools:
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "read_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "list_artifacts"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "write_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_finding"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "read_decisions"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_open_item"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_feedback"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_grounding"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "fetch_canonical_source"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_preamble"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_jargon_list"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "record_grounding_gap"

      session_service: *default_session_service
      artifact_service: *default_artifact_service
      artifact_handling_mode: "embed"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: 'Operations-perspective reviewer.

          '
        defaultInputModes:
        - text/plain
        - application/json
        defaultOutputModes:
        - text/plain
        - application/json
        skills:
        - id: review_ops
          name: Ops Review
          description: Operations-perspective reviewer
