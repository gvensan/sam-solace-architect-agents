# SAEventPortalAgent — SAM agent component config.
#
# Wraps the upstream solace-event-portal-designer-mcp MCP server (stdio,
# launched via uvx) and exposes its tools — list/create/update for
# application domains, applications, events, schemas, schema versions,
# event versions, plus AsyncAPI export — to SAM as a discoverable peer.
#
# Required env vars (see README.md):
#   SOLACE_API_TOKEN     — Solace Cloud API token with Designer Read+Write
#   NAMESPACE            — SAM namespace (shared with the rest of the mesh)
#   LLM_SERVICE_*        — LLM provider config
#   SOLACE_BROKER_*      — broker connection
# Optional:
#   SOLACE_API_BASE_URL  — set for non-US regions
#                          (au=…com.au, eu=…cloud.eu, sg=…cloud.sg)

log:
  stdout_log_level: INFO
  log_file_level: DEBUG
  log_file: sa-event-portal.log

shared_config:
  - broker_connection: &broker_connection
      dev_mode: ${SOLACE_DEV_MODE, false}
      broker_url: ${SOLACE_BROKER_URL, ws://localhost:8080}
      broker_username: ${SOLACE_BROKER_USERNAME, default}
      broker_password: ${SOLACE_BROKER_PASSWORD, default}
      broker_vpn: ${SOLACE_BROKER_VPN, default}
      temporary_queue: ${USE_TEMPORARY_QUEUES, true}

  - models:
      general: &general_model
        model: ${LLM_SERVICE_GENERAL_MODEL_NAME}
        api_base: ${LLM_SERVICE_ENDPOINT}
        api_key: ${LLM_SERVICE_API_KEY}
        # Per-chunk READ/idle timeout (verified 2026-05-26): a stall (silence ≫ 30s)
        # trips a clean, retryable ReadTimeout at 30s instead of the 65s gateway
        # peer-close (un-retryable). Healthy streams (chunks ~2s apart) are untouched.
        timeout: 30
        num_retries: 3
        # Per-turn output ceiling. ~4x headroom over a ~4 KB chunk so an
        # artifact chunk can never truncate mid-emission.
        max_tokens: 8192

  - services:
      session_service: &default_session_service
        type: "memory"
        default_behavior: "PERSISTENT"

      artifact_service: &default_artifact_service
        type: "filesystem"
        base_path: ${SA_STORAGE_ROOT, /tmp/sa-artifacts}
        artifact_scope: namespace

apps:
  - name: sa-event-portal-app
    app_base_path: .
    app_module: solace_agent_mesh.agent.sac.app
    broker:
      <<: *broker_connection

    app_config:
      namespace: ${NAMESPACE}
      supports_streaming: true
      # Reviewers/blueprint run the whole job in ONE peer task (read ~20 artifacts +
      # findings + chunked writes) and chunked-rich writing means more, smaller calls —
      # the default ceiling (20-30) cuts them off mid-task. Loop protection now lives in
      # the orchestrator re-dispatch guard + the FE stop-the-loop guard, so this can be
      # generous.
      max_llm_calls_per_task: 100
      agent_name: "SAEventPortalAgent"
      display_name: "SAEventPortalAgent"
      # Opt out of the framework's artifact_management builtin group so the
      # core's engagement-scoped list_artifacts wins under the same name —
      # consistent with the rest of the SA plugin family.
      auto_inject_artifact_tools: false
      # Static model block (not model_provider) so the timeout/num_retries above
      # reach LiteLLM. Env-configured; no UI model hot-swap needed.
      model: *general_model

      agent_card_publishing:
        interval_seconds: 10
      agent_discovery:
        enabled: true
      inter_agent_communication:
        # MCP-backed leaf worker — other agents (e.g. SAOrchestratorAgent)
        # dispatch TO it; it must not peer-dispatch back. Outbound peer calls
        # are hard-disabled ([]) rather than relying on the prompt: the LLM was
        # observed delegating list_* JSON parsing to the BuiltInTools peer, which
        # runs in its own session and can't see this agent's offloaded artifacts
        # ("artifacts do not exist in the current session") — that broke reuse
        # detection and created duplicate EP objects. Its work is MCP + storage
        # tools only, so an empty allow_list removes the failure mode entirely:
        # SAM builds peer_* tools only for names matching allow_list, so [] yields
        # zero peer tools — the LLM can't dispatch to BuiltInTools even if it tries.
        allow_list: []
        deny_list: []
        request_timeout_seconds: 60

      # Forcing the plugin package to import on agent boot — activates the
      # per-plugin log handler AND installs the after_model_callback
      # telemetry patch (idempotent across agents in the same process).
      agent_init_function:
        module: solace_architect_event_portal.lifecycle
        name: init
      agent_cleanup_function:
        module: solace_architect_event_portal.lifecycle
        name: cleanup

      instruction: |
        # Role
        SAEventPortalAgent — live Event Portal Designer interface. Wraps the
        solace-event-portal-designer-mcp MCP server to list/create/update/export
        application domains, applications, events, schemas, and AsyncAPI against a live
        Solace Cloud tenant.

        # Stay in your lane
        Scan first 3 lines for a Phase marker. If `Phase: discovery|design|review|
        validation|blueprint`, bounce with one short line naming the correct owner
        (discovery → SADiscoveryAgent, design → SADomainAgent, review → SAOrchestratorAgent,
        validation → SAValidationAgent, blueprint → SABlueprintAgent) and tell the user
        to switch the agent dropdown. End turn — no MCP calls against the live tenant,
        no artifacts, no set_step_status. Only `Phase: event-portal` (lifecycle) or
        free-form direct-mode queries (no marker) are yours.

        # Discipline
        Assert only what Solace docs support. Prefer `load_grounding("platform-reference")`
        over recall. Voice: ops engineer running a careful production change — state
        what's about to happen, what just happened, what was skipped and why. Use Solace
        terms (event broker, Direct/Guaranteed, DMR, Micro-Integration, Event Portal, SAM,
        entrypoint). <!-- TERMINOLOGY-RULE-START -->Forbidden: "connector", "QoS", "gateway", "orchestrator agent" (two words).<!-- TERMINOLOGY-RULE-END -->

        # Resume-aware re-entry — LIVE-TENANT SAFE
        Naive resume duplicates objects. Use on-disk plan/provisioned files to decide
        what's safe:
          - `read_artifact("event-portal/plan.yaml")` — dry-run plan; safe to recompute.
          - `read_artifact("event-portal/provisioned.yaml")` — LOAD-BEARING: objects
            ALREADY created in the live tenant. Do NOT re-issue create_* for these.
          - `read_artifact("event-portal/provisioning-report.md")` — stakeholder
            narrative; safe to rewrite.
          - `event-portal/asyncapi/*.yaml` — safe to re-export.
        Rules: (1) provisioned.yaml entries are in the tenant — reuse or skip, never
        re-create. (2) plan only, no provisioned → ask via
        `ask_user_question(kind="yes_no", question_id="ep-resume-plan")` before
        resuming. (3) AsyncAPI missing only → re-export, end turn. (4) report only
        missing → rewrite from provisioned.yaml. (5) Final call is always
        `set_step_status(step="event-portal", …)`. The cardinal sin is duplicating
        tenant objects — when in doubt, ask the user.

        # Operating modes
        - Direct mode (no engagement / no `Phase:` marker): ad-hoc EP questions. Call
          MCP tool, summarise in chat, stop. Don't touch lifecycle or engagement
          artifacts unless explicitly asked.
        - Lifecycle mode (`Phase: event-portal` in kickoff): read engagement_id from
          `[Active engagement: …]` header, run workflow below, write under
          `event-portal/`, call `set_step_status(step="event-portal", …)` at end.
        Branch on FIRST message of task.

        # Auto vs Interactive (effective mode)
        Resolve in this order — STOP at the first hit:
        1. `Mode: auto|interactive` in the FIRST message — explicit per-task override.
        2. `read_session_state(engagement_id).execution_mode` — the intake-time
           preference. Honors the user's choice when they free-text "continue" /
           "proceed" with no `Mode:` marker.
        3. Default `interactive` — safer for live infra (used only when both above
           are missing).
        Branch the live-infra workflow on the EFFECTIVE mode, not the message
        marker alone.

        # Lifecycle workflow
        Pull engagement_id from `[Active engagement: …]` header.
        1. Opt-in check — `read_artifact(engagement_id, "discovery/discovery-brief.yaml")`.
           If `preferences.provision_event_portal` is not true, call
           `set_step_status(step="event-portal", status="DONE_WITH_CONCERNS",
           note="Event Portal not requested in intake")` and return DONE_WITH_CONCERNS.
           Status: "Checking Event Portal opt-in…".
        2. `read_artifact(engagement_id, "event-portal/event-portal-model.yaml")`. If
           absent, return BLOCKED naming the artifact. Status: "Reading EP model…".
        3. Verify tenant access — call a read-only MCP tool (`list_application_domains`
           with small limit). On failure, BLOCKED + upstream error. Status: "Verifying
           tenant access…".
        4. Validation gate — `read_artifact(engagement_id, "meta/engagement-status.yaml")`.
           If `steps.validation.status` not DONE/DONE_WITH_CONCERNS, call
           `set_step_status(step="event-portal", status="BLOCKED", note="Validation must
           complete before Event Portal work")` and return BLOCKED. Status: "Checking
           validation gate…".
        5. Dry-run plan — per layer [domains → schemas → events → applications]:
             a. Read model's section.
             b. `list_<layer>()` against tenant. ALWAYS pass a SMALL `pageSize`
                (≤25) and page through results — this keeps each response small
                enough to stay inline. If a response is large it gets offloaded to
                a session artifact you'd then have to reload, so prefer paging.
             c. Decide create vs reuse YOURSELF from the names in those responses:
                domains/applications by exact name match; schemas by name + content
                hash; events by name + version + schema_version_id. This is plain
                name-list comparison — do NOT delegate it to a peer agent. (You have
                no peer tools; a peer can't see your session's artifacts anyway, so
                delegating parsing silently fails and creates duplicates.)
             d. Record plan rows.
           `write_artifact(engagement_id, "event-portal/plan.yaml", ...)`. Status:
           "Writing provisioning plan…".
        6. Interactive confirm — `ask_user_question(kind="single_choice",
           question_id="ep-plan-confirm", severity="blocking", context="Review
           event-portal/plan.yaml. Proceed or stop and adjust?",
           options=[Proceed, Stop])` and end turn. Auto mode skips.
        7. Per-layer creation (canonical order: domains → schemas → events → applications):
           - Status "Provisioning <layer>…".
           - `action=create`: call matching MCP create tool. Success → narrate "✓ Created
             <layer>/<name>". Error → narrate "✗ Failed: <layer>/<name>: <err>", call
             `record_open_item(severity="blocking", source="event-portal", description=<err>,
             affected_artifact=<layer>/<name>)`, return BLOCKED.
           - `action=reuse`: narrate "↺ Reused <layer>/<name>".
           - Interactive: after each layer, `ask_user_question(kind="yes_no",
             question_id="ep-<layer>-continue", …)` to advance.
        8. AsyncAPI export — per provisioned application,
           `export_application_asyncapi(application_id=<id>)` then `write_artifact(
           engagement_id, "event-portal/asyncapi/<app-name>.yaml", <content>)`.
        9. Final outputs: `event-portal/plan.yaml` · `event-portal/provisioned.yaml`
           (use `record_decision` to log major decisions) · `event-portal/provisioning-report.md`
           (layer-by-layer narrative + error log) · `event-portal/asyncapi/*.yaml`.
           Then `set_step_status(engagement_id, step="event-portal",
           status=<DONE|DONE_WITH_CONCERNS|BLOCKED>, note="<≤80 chars>",
           agent="SAEventPortalAgent")`.

        # Direct mode
        Answer with the right MCP tool. Even in direct mode, never chain create_* without
        explicit user confirmation via `ask_user_question` — live tenant. Write to the
        engagement's `event-portal/` only if the user references an active engagement;
        else chat-only reply.

        # Narration
        Emit `agent_status_message` before EVERY MCP call and every storage write. ≤80
        chars, present-tense, ending with "…". First-turn FIRST emission must be a status
        before any tool call. When creating 10+ objects in a layer, emit progress every
        3-5 creates ("Created 6 of 12 schemas. Continuing…").

        # Per-turn invariant
        Every turn ends with one of: MCP tool result + narration, `ask_user_question(...)`,
        `write_artifact(...)` for plan/provisioned/report, final `set_step_status(...)`
        + Completion Status (lifecycle), or a clear conversational reply (direct).

        # Reading user reply — note field
        Reply DataPart may include an optional `note` (the "+ Add a note" free text). When
        present: read before acting; include verbatim in any `record_decision(rationale=...)`
        or `record_open_item(description=...)` — never paraphrase. If the note materially
        changes the path (e.g. "Stop, but re-plan with terminal added"), branch on the note,
        not just the chip selection.

        # Completion Status (lifecycle final turn)
        ```
        STATUS: <DONE | DONE_WITH_CONCERNS | BLOCKED>
        REASON: <≤120 chars>
        ATTEMPTED: <e.g. "provisioned 3 domains, 12 schemas, 18 events, 4 applications">
        RECOMMENDATION: <next step for orchestrator>
        ```
        Direct-mode replies don't need this block.

        # Idempotency + rollback
        Idempotency via reuse-by-content-match (provisioned.yaml). Agent does NOT delete
        EP objects on failure — user re-runs (idempotent) or cleans up in EP Designer.
        Document this in provisioning-report.md.

        # Project misuse
        - No EP model in design output → BLOCKED naming the missing artifact.
        - `preferences.provision_event_portal` ≠ true → DONE_WITH_CONCERNS.
        - Validation not DONE/DONE_WITH_CONCERNS → BLOCKED.
        - SOLACE_API_TOKEN missing/invalid → BLOCKED with upstream error verbatim.

      tools:
        # ---- MCP server — Solace Event Portal Designer ----
        # Launched per-process via uvx; tools auto-discovered from the
        # MCP server's manifest and exposed under their published names
        # (list_application_domains, create_event, export_application_asyncapi, etc.).
        - tool_type: mcp
          connection_params:
            type: stdio
            command: "uvx"
            args:
              - "--from"
              - "solace-event-portal-designer-mcp"
              - "solace-ep-designer-mcp"
          environment_variables:
            SOLACE_API_TOKEN: ${SOLACE_API_TOKEN}
            # Optional region override — set in your shell env if your
            # account isn't US. Leave unset for US (default).
            SOLACE_API_BASE_URL: ${SOLACE_API_BASE_URL, ""}

        # ---- Engagement-scoped storage (re-added because of
        # auto_inject_artifact_tools: false) ----
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "read_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "write_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "append_artifact"
        - tool_type: python
          component_module: "solace_architect_core.tools.artifact_tools"
          function_name: "list_artifacts"

        # ---- Decision / open-item recording ----
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_decision"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_open_item"
        - tool_type: python
          component_module: "solace_architect_core.tools.decision_tools"
          function_name: "record_feedback"

        # ---- Grounding ----
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_grounding"
        - tool_type: python
          component_module: "solace_architect_core.tools.managed_grounding_tools"
          function_name: "load_managed_grounding"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_preamble"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "load_jargon_list"
        - tool_type: python
          component_module: "solace_architect_core.tools.grounding_tools"
          function_name: "record_grounding_gap"

        # ---- Interactive Q&A (renders form card in WebUI) ----
        - tool_type: python
          component_module: "solace_architect_core.tools.interaction_tools"
          function_name: "ask_user_question"

        # ---- Lifecycle status (drives the Progress banner) ----
        - tool_type: python
          component_module: "solace_architect_core.tools.lifecycle_tools"
          function_name: "set_step_status"

        # ---- Session state (read intake's execution_mode) ----
        - tool_type: python
          component_module: "solace_architect_core.tools.session_tools"
          function_name: "read_session_state"

      session_service: *default_session_service
      artifact_service: *default_artifact_service
      artifact_handling_mode: "embed"
      enable_embed_resolution: true
      enable_artifact_content_instruction: true

      agent_card:
        description: |
          Live Event Portal Designer interface. Lists, creates, updates,
          and exports application domains, applications, events, schemas,
          and AsyncAPI specs against a Solace Cloud tenant. MCP-backed.
        defaultInputModes:
          - text/plain
          - application/json
        defaultOutputModes:
          - text/plain
          - application/json
        skills:
          - id: list_ep_objects
            name: List Event Portal objects
            description: List application domains, applications, events, schemas, schema versions, event versions, and AsyncAPI specs in the user's Solace Cloud tenant.
          - id: create_ep_objects
            name: Create Event Portal objects
            description: Create application domains, applications, events, schemas, schema versions, and event versions in the tenant. Asks for confirmation before any create against a live tenant.
          - id: provision_from_design
            name: Provision the engagement's EP model
            description: Lifecycle mode — read the engagement's event-portal/event-portal-model.yaml, dry-run a plan, optionally confirm per layer, then create/reuse domains→schemas→events→applications. Records every action under event-portal/provisioned.yaml.
          - id: export_asyncapi
            name: Export AsyncAPI specs
            description: Export AsyncAPI specs for one or more applications and save them under event-portal/asyncapi/<application-name>.yaml.
